name: moviepilot_mobile
description: MoviePilot Flutter mobile client
publish_to: none
version: 1.1.8+29
license: BSL-1.1
environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  get: ^4.7.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cookie_jar: ^4.0.8
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.0.10+1
  flutter_markdown: ^0.7.7+1
  talker: ^5.1.13
  talker_flutter: ^5.1.13
  talker_dio_logger: ^5.1.13
  syncfusion_flutter_charts: ^31.1.25
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  modal_bottom_sheet: ^3.0.0
  skeletonizer: ^2.1.2
  url_launcher: ^6.3.2
  flutter_floating_bottom_bar: ^1.4.0
  path_provider: ^2.1.5
  palette_generator: ^0.3.3+7
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.0
  webview_flutter_wkwebview: ^3.9.4
  soft_edge_blur: ^0.1.3
  image_picker: ^1.1.2
  package_info_plus: ^9.0.0
  jpush_flutter: ^3.1.8
  altman_downloader_control:
    git: https://github.com/singleton-altman/altman_downloader_control.git
  altman_totp:
    path: ./altman_totp
  lottie: ^3.3.3
dependency_overrides:
  path_provider:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/path_provider/path_provider
      ref: br_path_provider-v2.1.5_ohos
  shared_preferences:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/shared_preferences/shared_preferences
      ref: br_shared_preferences-v2.3.2_ohos
  url_launcher:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/url_launcher/url_launcher
      ref: br_url_launcher-v6.3.2_ohos
  image_picker:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages.git
      path: packages/image_picker/image_picker
      ref: br_image_picker-v1.1.2_ohos
  package_info_plus:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_plus_plugins.git
      path: packages/package_info_plus/package_info_plus
      ref: br_package_info_plus-v8.1.0_ohos
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  hive_ce_generator: ^1.8.0
  freezed: ^2.4.8
  json_serializable: ^6.8.0
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.2
  path_provider_android: ^2.3.1
flutter:
  generate: true
  uses-material-design: true
  assets:
  - CHANGELOG.md
  - assets/logo.svg
  - assets/images/avatars/
  - assets/images/pages/
  - assets/images/logos/
  - assets/images/misc/
  - assets/images/svg/
  - assets/lottie/
flutter_gen:
  output: lib/gen/
  integrations:
    image: true
    flutter_svg: true
    rive: true
    lottie: true
flutter_launcher_icons:
  android: launcher_icon
  ios: false
  ohos: true
  image_path: assets/icon.png
  min_sdk_android: 21
